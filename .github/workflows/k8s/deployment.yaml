apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-saas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-saas

  template:
    metadata:
      labels:
        app: ai-saas

    spec:
      containers:
        - name: ai-saas
          image: ghcr.io/xxx/ai-saas:latest
          ports:
            - containerPort: 8000
