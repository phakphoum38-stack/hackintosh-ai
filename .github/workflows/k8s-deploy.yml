name: AI SaaS Kubernetes Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set tag
      run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build & Push Image
      run: |
        docker build -t ghcr.io/${{ github.repository }}/ai-saas:$TAG .
        docker push ghcr.io/${{ github.repository }}/ai-saas:$TAG

    - name: Deploy to Kubernetes
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.K8S_HOST }}
        username: ${{ secrets.K8S_USER }}
        key: ${{ secrets.K8S_SSH_KEY }}
        script: |
          kubectl set image deployment/ai-saas ai-saas=ghcr.io/${{ github.repository }}/ai-saas:$TAG
          kubectl rollout status deployment/ai-saas
