name: Docker Image CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set tags
      run: |
        echo "TAG_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
        echo "TAG_TIME=$(date +%s)" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push
      run: |
        docker buildx build \
          --push \
          -t ghcr.io/${{ github.repository }}/ai-saas:latest \
          -t ghcr.io/${{ github.repository }}/ai-saas:$TAG_SHA \
          -t ghcr.io/${{ github.repository }}/ai-saas:$TAG_TIME \
          .

    - name: Done
      run: echo "✅ Docker image pushed"
