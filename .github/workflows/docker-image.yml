name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔐 LOGIN GHCR
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 🏷️ TAG แบบโปร (commit + timestamp)
    - name: Set tags
      run: |
        echo "TAG_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
        echo "TAG_TIME=$(date +%s)" >> $GITHUB_ENV

    # ⚡ เปิด buildx (build เร็วขึ้น + รองรับ multi-stage)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 🧱 BUILD (multi-tag)
    - name: Build image
      run: |
        docker build \
          -t ghcr.io/${{ github.repository }}/ai-saas:latest \
          -t ghcr.io/${{ github.repository }}/ai-saas:$TAG_SHA \
          -t ghcr.io/${{ github.repository }}/ai-saas:$TAG_TIME \
          .

    # 🚀 PUSH ทุก tag
    - name: Push image
      run: |
        docker push ghcr.io/${{ github.repository }}/ai-saas:latest
        docker push ghcr.io/${{ github.repository }}/ai-saas:$TAG_SHA
        docker push ghcr.io/${{ github.repository }}/ai-saas:$TAG_TIME
