steps:
- name: Checkout repo
  uses: actions/checkout@v4

- name: Setup Python
  uses: actions/setup-python@v5
  with:
    python-version: "3.10"

- name: Cache pip
  uses: actions/cache@v4
  with:
    path: ~/.cache/pip
    key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    restore-keys: |
      ${{ runner.os }}-pip-

- name: Install dependencies
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt

- name: Run trainer
  run: PYTHONPATH=. python -m backend.core.trainer

- name: Upload model
  uses: actions/upload-artifact@v4
  with:
    name: trained-model
    path: backend/model/

# 🧪 DEBUG
- name: Debug SSH
  run: |
    echo "HOST=${{ secrets.SSH_HOST }}"
    echo "USER=${{ secrets.SSH_USER }}"

# 🔍 CHECK
- name: Check SSH config
  id: check_ssh
  run: |
    if [ -z "${{ secrets.SSH_HOST }}" ]; then
      echo "use_ssh=false" >> $GITHUB_OUTPUT
      echo "❌ No SSH_HOST → skip deploy"
    else
      echo "use_ssh=true" >> $GITHUB_OUTPUT
      echo "✅ SSH ready"
    fi

# 🚀 Deploy via SSH
- name: Deploy via SSH
  if: steps.check_ssh.outputs.use_ssh == 'true'
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.SSH_HOST }}
    username: ${{ secrets.SSH_USER }}
    key: ${{ secrets.SSH_KEY }}
    port: 22
    script: |
      echo "🚀 Deploying..."
      cd /path/to/your/project || exit 1
      git pull
      pip install -r requirements.txt
      echo "✅ Deploy
