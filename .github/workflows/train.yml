steps:
- name: Checkout repo
  uses: actions/checkout@v4

- name: Setup Python
  uses: actions/setup-python@v5
  with:
    python-version: "3.10"

- name: Cache pip
  uses: actions/cache@v4
  with:
    path: ~/.cache/pip
    key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    restore-keys: |
      ${{ runner.os }}-pip-

- name: Install dependencies
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt

- name: Run trainer
  run: PYTHONPATH=. python -m backend.core.trainer

- name: Upload model
  uses: actions/upload-artifact@v4
  with:
    name: trained-model
    path: backend/model/

# 🧪 DEBUG (ไม่โชว์ค่าจริง แต่เช็คว่ามีไหม)
- name: Debug SSH
  run: |
    if [ -z "${{ secrets.SSH_HOST }}" ]; then echo "❌ SSH_HOST empty"; else echo "✅ SSH_HOST OK"; fi
    if [ -z "${{ secrets.SSH_USER }}" ]; then echo "❌ SSH_USER empty"; else echo "✅ SSH_USER OK"; fi
    if [ -z "${{ secrets.SSH_KEY }}" ]; then echo "❌ SSH_KEY empty"; else echo "✅ SSH_KEY OK"; fi

# 🔍 VALIDATE (กันพังตั้งแต่ต้น)
- name: Validate SSH secrets
  id: check_ssh
  run: |
    if [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.SSH_USER }}" ] || [ -z "${{ secrets.SSH_KEY }}" ]; then
      echo "use_ssh=false" >> $GITHUB_OUTPUT
      echo "❌ SSH not ready → skip deploy"
    else
      echo "use_ssh=true" >> $GITHUB_OUTPUT
      echo "✅ SSH ready"
    fi

# 🚀 Deploy via SSH
- name: Deploy via SSH
  if: steps.check_ssh.outputs.use_ssh == 'true'
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.SSH_HOST }}
    username: ${{ secrets.SSH_USER }}
    key: ${{ secrets.SSH_KEY }}
    port: 22
    script: |
      echo "🚀 Deploying..."

      # เปลี่ยน path ตรงนี้ให้เป็นของจริง
      cd /var/www/myapp || exit 1

      # ดึงโค้ดล่าสุด
      git pull

      # อัปเดต dependency
      pip install -r requirements.txt

      echo "✅ Deploy success"
