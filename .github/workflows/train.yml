name: Train Model

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    # 📦 1. โหลด repo
    - name: Checkout repo
      uses: actions/checkout@v4

    # 🐍 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ⚡ 3. Cache pip
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 📥 4. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 🧠 5. Train model
    - name: Run trainer
      run: PYTHONPATH=. python -m backend.core.trainer

    # 💾 6. Save model เป็น artifact (กันหาย)
    - name: Upload model
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: backend/model/

    # 🚀 7. Deploy (จะรันเฉพาะตอนมี secrets ครบ)
    - name: Deploy via SSH
      if: ${{ secrets.SSH_HOST != '' }}
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        port: 22
        script: |
          echo "🚀 Deploying..."
          cd /path/to/your/project || exit 1
          git pull
          pip install -r requirements.txt
          echo "✅ Deploy done"
