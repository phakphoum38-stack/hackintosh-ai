name: AI SaaS Full Pipeline

on:
  push:
    branches: ["main"]

jobs:

  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. python -m backend.core.trainer

  docker:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push
        run: |
          docker buildx build \
            --push \
            -t ghcr.io/${{ github.repository }}/ai-saas:latest \
            .

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy to K8s
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.K8S_HOST }}
          username: ${{ secrets.K8S_USER }}
          key: ${{ secrets.K8S_SSH_KEY }}
          script: |
            kubectl rollout restart deployment ai-saas
