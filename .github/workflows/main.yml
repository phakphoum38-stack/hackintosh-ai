name: AI EFI Full Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:   # ⭐ เพิ่มอันนี้

jobs:

  ai-train:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - run: pip install -r requirements.txt

    - run: echo "PYTHONPATH=." >> $GITHUB_ENV

    - run: mkdir -p models EFI/OC

    - run: PYTHONPATH=. python -m backend.core.trainer

    - uses: actions/upload-artifact@v4
      with:
        name: model
        path: models/latest.pth


  build-efi:
    runs-on: ubuntu-latest
    needs: ai-train
    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: model
        path: models

    - run: |
        PYTHONPATH=. python -c "from backend.builder.efi_builder import build_efi; build_efi({'cpu':'Intel','gpu':'Intel','acpi_score':70,'gpu_score':60,'usb_score':80})"

    - uses: actions/upload-artifact@v4
      with:
        name: EFI
        path: EFI


  docker:
    runs-on: ubuntu-latest
    needs: [ai-train, build-efi]

    steps:
    - uses: actions/checkout@v4

    - run: echo "VERSION=v1.0.${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

    - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - uses: docker/setup-buildx-action@v3

    - run: |
        docker buildx build \
          -t ghcr.io/${{ github.repository }}/ai-saas:${VERSION} \
          -t ghcr.io/${{ github.repository }}/ai-saas:latest \
          --push .
