<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded shadow w-80">
  <h2 class="text-xl font-bold mb-4">🔐 Login</h2>

  <input id="user_id" placeholder="User ID"
    class="w-full p-2 border mb-2 rounded" />

  <input id="tenant_id" placeholder="Tenant ID"
    class="w-full p-2 border mb-4 rounded" />

  <button onclick="login()"
    class="w-full bg-blue-600 text-white p-2 rounded">
    Login
  </button>

  <div id="error" class="text-red-500 mt-2"></div>
</div>

<script>
const API = "https://hackintosh-ai-2.onrender.com"

async function login() {
  const user_id = document.getElementById("user_id").value
  const tenant_id = document.getElementById("tenant_id").value

  const res = await fetch(`${API}/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      id: user_id,
      tenant_id: tenant_id
    })
  })

  const data = await res.json()

  if (data.access_token) {
    localStorage.setItem("token", data.access_token)
    window.location.href = "/dashboard"
  } else {
    document.getElementById("error").innerText = "Login failed"
  }
}
</script>

</body>
</html>
